<!-- Header Component -->
<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-xl border-b border-gray-100">
    <div class="flex items-center justify-between h-[72px] px-4 sm:px-6">
        <div class="flex items-center gap-3">
            <button class="lg:hidden p-2 hover:bg-gray-100 rounded-xl transition-colors">
                <i class="fa-solid fa-bars text-gray-600"></i>
            </button>
            <div class="hidden sm:flex items-center">
                <input type="text" placeholder="Search anything..." class="forge-search">
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button class="relative p-2.5 hover:bg-gray-100 rounded-xl transition-colors">
                <i class="fa-regular fa-bell text-gray-500 text-lg"></i>
                <span class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
            <div class="w-px h-8 bg-gray-200 mx-1 hidden sm:block"></div>
            <button class="flex items-center gap-2.5 pl-2 pr-3 py-1.5 hover:bg-gray-100 rounded-xl transition-colors">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white font-bold text-xs">JD</div>
                <div class="hidden sm:block text-left">
                    <p class="text-sm font-semibold text-gray-800 leading-tight">John Doe</p>
                    <p class="text-[11px] text-gray-400">Administrator</p>
                </div>
                <i class="fa-solid fa-chevron-down text-gray-400 text-xs hidden sm:block"></i>
            </button>
        </div>
    </div>
</header>
